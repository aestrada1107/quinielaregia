<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUINIELAS REGIAS - YEMI</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --verde: #006847; --rojo: #CE1126; --azul: #007bff; --oro: #fff3cd; --oro-txt: #856404; --oscuro: #222; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; margin: 0; padding: 10px; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 600px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header-main { background: var(--verde); color: white; padding: 20px; text-align: center; border-bottom: 5px solid var(--rojo); }
        .header-main h1 { margin: 0; font-size: 1.5em; text-transform: uppercase; letter-spacing: 1px; }
        .tabs { display: flex; background: var(--oscuro); }
        .tab-btn { flex: 1; padding: 15px; color: #bbb; border: none; background: none; cursor: pointer; font-weight: bold; font-size: 0.85em; }
        .tab-btn.active { color: white; background: var(--verde); border-bottom: 4px solid var(--rojo); }
        .content { padding: 15px; display: none; }
        .content.active { display: block; }
        .partido-card { background: #fff; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 12px; padding: 12px; display: flex; align-items: center; justify-content: space-between; }
        .equipo { font-weight: 700; width: 30%; font-size: 0.85em; text-align: center; color: #333; }
        .lev-container { display: flex; gap: 5px; width: 40%; }
        .btn-lev { border: 2px solid #ccc; background: #fdfdfd; padding: 12px 0; border-radius: 8px; font-weight: 900; flex: 1; color: #666; cursor: pointer; }
        .btn-lev.selected { background: var(--verde); color: white; border-color: var(--verde); }
        .btn-lev.real { background: var(--rojo); color: white; border-color: var(--rojo); }
        .btn-main { width: 100%; padding: 18px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9em; }
        th, td { padding: 12px 8px; border-bottom: 1px solid #eee; text-align: left; }
        .ganador-row { background: var(--oro) !important; color: var(--oro-txt) !important; font-weight: bold; }
        .admin-card { background: #f9f9f9; padding: 15px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 15px; }
        input[type="text"], input[type="number"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; margin-bottom: 10px; }
        .paginacion { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-main">
        <h1>🇲🇽 QUINIELAS REGIAS 🇲🇽</h1>
        <p id="display-jornada">---</p>
    </div>

    <div style="text-align:center; padding:10px; border-bottom: 1px solid #eee;">
        <h2 style="font-size: 0.8em; color: #bbb;">Panel de <span onclick="activarAdmin()" style="cursor:pointer">Acceso</span></h2>
    </div>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('jugador')">REGISTRO</button>
        <button class="tab-btn" onclick="showTab('posiciones')">TABLA</button>
        <button class="tab-btn" id="btn-admin" style="display:none;" onclick="showTab('admin')">ADMIN PRO</button>
    </div>

    <div id="jugador" class="content active">
        <div id="registro-area">
            <input type="text" id="nombreInput" placeholder="Nombre completo">
            <div id="lista-jugador"></div>
            <button class="btn-main" style="background: var(--verde)" onclick="guardarJugada()">✅ GENERAR TICKET</button>
        </div>
        <div id="ticket-final" style="display:none; border:2px solid var(--verde); padding:15px; border-radius:8px; margin-top:10px;">
            <div id="mensaje-texto" style="white-space:pre-wrap; font-family:monospace; background:#f4f4f4; padding:10px; font-size:0.9em;"></div>
            <button onclick="copiarAlPortapapeles()" class="btn-main" style="background: var(--azul); margin-top:10px;">📋 COPIAR WHATSAPP</button>
            <button onclick="resetRegistro()" style="width:100%; border:none; background:none; color:gray; margin-top:15px; cursor:pointer;">Hacer otra quiniela</button>
        </div>
    </div>

    <div id="posiciones" class="content">
        <div style="margin-bottom:10px; text-align:right;">
            <label style="font-size:0.7em; font-weight:bold;">Ver Jornada: </label>
            <select id="filtro-tabla" onchange="calcularLeaderboard()" style="padding:5px; border-radius:5px;"></select>
        </div>
        <div id="render-puntos"></div>
    </div>

    <div id="admin" class="content">
        <div class="admin-card">
            <h4>🚀 Lanzar Siguiente Jornada</h4>
            <input type="text" id="cfg-jornada" placeholder="Nombre (Ej: JORNADA 11)">
            <input type="number" id="cfg-costo" placeholder="Costo $">
            <div id="editor-equipos"></div>
            <button class="btn-main" style="background: var(--azul); padding:10px;" onclick="guardarNuevaJornada()">🚀 LANZAR JORNADA</button>
        </div>

        <div class="admin-card">
            <h4>⚽ Resultados Oficiales (<span class="jor-act-txt"></span>)</h4>
            <div id="lista-admin"></div>
            <button class="btn-main" style="background: var(--rojo)" onclick="publicarOficiales()">📢 PUBLICAR RESULTADOS</button>
        </div>

        <div class="admin-card">
            <h4>👥 Participantes (<span class="jor-act-txt"></span>)</h4>
            <input type="text" id="buscador" placeholder="🔍 Buscar nombre..." oninput="renderAdminParticipantes()">
            <div id="admin-participantes"></div>
            <div class="paginacion">
                <button onclick="cambiarPagina(-1)" style="padding:8px; background:#333; color:white; border:none; border-radius:5px;">« Ant</button>
                <span id="page-info" style="font-size:0.8em; font-weight:bold;">Pág 1</span>
                <button onclick="cambiarPagina(1)" style="padding:8px; background:#333; color:white; border:none; border-radius:5px;">Sig »</button>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBgmqQLnUIPuaDgXOEvuBAoY_mcd69Qw7E", authDomain: "quinielaligamx-68b52.firebaseapp.com", databaseURL: "https://quinielaligamx-68b52-default-rtdb.firebaseio.com", projectId: "quinielaligamx-68b52", storageBucket: "quinielaligamx-68b52.firebasestorage.app", messagingSenderId: "745257098090", appId: "1:745257098090:web:3c13bf19a1a0c1718ca313" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const EQUIPOS_INIT = [{id:1,l:"Mazatlán",v:"León"},{id:2,l:"Necaxa",v:"Pumas"},{id:3,l:"Cruz Azul",v:"Atl. San Luis"},{id:4,l:"Querétaro",v:"América"},{id:5,l:"Pachuca",v:"Puebla"},{id:6,l:"Atlas",v:"Chivas"},{id:7,l:"Tigres",v:"Monterrey"},{id:8,l:"Toluca",v:"FC Juárez"},{id:9,l:"Tijuana",v:"Santos"}];
    
    let JUGADAS_ALL = [], OFICIALES_HIST = {}, PARTIDOS = EQUIPOS_INIT, CONFIG = {costo:10, jornada:"JORNADA 10"}, PAGINA = 0, SEL_ADMIN = {}, SEL_USER = {};

    db.ref().on('value', snap => {
        const d = snap.val() || {};
        CONFIG = d.config || {costo:10, jornada:"JORNADA 10"};
        PARTIDOS = d.partidos || EQUIPOS_INIT;
        OFICIALES_HIST = d.oficial_historial || {};
        JUGADAS_ALL = d.jugadas ? Object.keys(d.jugadas).map(k => ({id: k, ...d.jugadas[k]})) : [];
        
        document.getElementById('display-jornada').innerText = CONFIG.jornada;
        document.querySelectorAll('.jor-act-txt').forEach(el => el.innerText = CONFIG.jornada);
        
        // Sincronizar selección Admin solo si está vacía
        const resActual = OFICIALES_HIST[CONFIG.jornada] || {};
        if(Object.keys(SEL_ADMIN).length === 0) SEL_ADMIN = JSON.parse(JSON.stringify(resActual));

        actualizarSelectJornadas();
        renderPartidos();
        renderEditor();
        renderAdminParticipantes();
        calcularLeaderboard();
        actualizarFinanzas();
    });

    function renderPartidos() {
        const dj = document.getElementById('lista-jugador'), da = document.getElementById('lista-admin');
        dj.innerHTML = ''; da.innerHTML = '';
        PARTIDOS.forEach(p => {
            const base = `<div class="partido-card"><div class="equipo">${p.l}</div><div class="lev-container">`;
            dj.innerHTML += base + `<button class="btn-lev ${SEL_USER[p.id]==='L'?'selected':''}" onclick="setS(${p.id},'L')">L</button><button class="btn-lev ${SEL_USER[p.id]==='E'?'selected':''}" onclick="setS(${p.id},'E')">E</button><button class="btn-lev ${SEL_USER[p.id]==='V'?'selected':''}" onclick="setS(${p.id},'V')">V</button></div><div class="equipo">${p.v}</div></div>`;
            da.innerHTML += base + `<button class="btn-lev ${SEL_ADMIN[p.id]==='L'?'real':''}" onclick="setO(${p.id},'L')">L</button><button class="btn-lev ${SEL_ADMIN[p.id]==='E'?'real':''}" onclick="setO(${p.id},'E')">E</button><button class="btn-lev ${SEL_ADMIN[p.id]==='V'?'real':''}" onclick="setO(${p.id},'V')">V</button></div><div class="equipo">${p.v}</div></div>`;
        });
    }

    function renderEditor() {
        const div = document.getElementById('editor-equipos'); 
        if(div.innerHTML !== "") return;
        for(let i=1; i<=9; i++) {
            div.innerHTML += `<div style="display:flex; gap:5px; margin-bottom:5px;"><input type="text" id="edit-l-${i}" placeholder="Local ${i}"><input type="text" id="edit-v-${i}" placeholder="Visita ${i}"></div>`;
        }
    }

    function calcularLeaderboard() {
        const jorSel = document.getElementById('filtro-tabla').value || CONFIG.jornada;
        const render = document.getElementById('render-puntos');
        const resOfi = OFICIALES_HIST[jorSel] || {};
        
        let filtradas = JUGADAS_ALL.filter(j => (!j.jornada && jorSel === "JORNADA 10") || j.jornada === jorSel);
        if(!filtradas.length) return render.innerHTML = "<p style='text-align:center; padding:20px; color:gray;'>Sin registros en esta jornada.</p>";

        let tabla = filtradas.map(j => {
            let pts = 0;
            PARTIDOS.forEach(p => { if(resOfi[p.id] && String(j.votos[p.id]) === String(resOfi[p.id])) pts++; });
            return { nombre: j.nombre, pts: pts, t: j.timestamp || 0 };
        }).sort((a,b) => b.pts - a.puntos || a.t - b.t);

        let h = '<table><tr><th>#</th><th>Nombre</th><th>Pts</th></tr>';
        const top = tabla[0].pts;
        tabla.forEach((it, i) => {
            const win = (top > 0 && it.pts === top && i === 0);
            h += `<tr class="${win?'ganador-row':''}"><td>${i+1}</td><td>${it.nombre}${win?' 🏆':''}</td><td><strong>${it.pts}</strong></td></tr>`;
        });
        render.innerHTML = h + '</table>';
    }

    function actualizarSelectJornadas() {
        const sel = document.getElementById('filtro-tabla');
        const jornadas = [...new Set(JUGADAS_ALL.map(j => j.jornada || "JORNADA 10"))];
        if(!jornadas.includes(CONFIG.jornada)) jornadas.push(CONFIG.jornada);
        const actual = sel.value;
        sel.innerHTML = jornadas.map(j => `<option value="${j}" ${j===actual?'selected':''}>${j}</option>`).join('');
        if(!actual) sel.value = CONFIG.jornada;
    }

    function renderAdminParticipantes() {
        const div = document.getElementById('admin-participantes'); div.innerHTML = '';
        const bus = document.getElementById('buscador').value.toLowerCase();
        let filtrados = JUGADAS_ALL.filter(j => (!j.jornada || j.jornada === CONFIG.jornada) && j.nombre.toLowerCase().includes(bus));
        document.getElementById('page-info').innerText = `Pág ${PAGINA+1} de ${Math.ceil(filtrados.length/10)||1}`;
        filtrados.slice(PAGINA*10, (PAGINA*10)+10).forEach(j => {
            div.innerHTML += `<div class="partido-card"><span>${j.nombre}</span><div><button onclick="db.ref('jugadas/${j.id}').update({pagado:${!j.pagado}})">${j.pagado?'$':'X'}</button><button onclick="if(confirm('¿Borrar?')) db.ref('jugadas/${j.id}').remove()">🗑️</button></div></div>`;
        });
    }

    function guardarNuevaJornada() {
        const jor = document.getElementById('cfg-jornada').value.toUpperCase();
        if(!jor) return alert("Nombre jornada requerido");
        const nuevos = [];
        for(let i=1; i<=9; i++) { 
            nuevos.push({ id: i, l: document.getElementById(`edit-l-${i}`).value || "Local "+i, v: document.getElementById(`edit-v-${i}`).value || "Visita "+i }); 
        }
        db.ref().update({ 
            config: { jornada: jor, costo: document.getElementById('cfg-costo').value || 10 }, 
            partidos: nuevos 
        }).then(() => { 
            alert("Nueva Jornada Lanzada 🚀. Formulario limpio para nuevos registros."); 
            SEL_USER = {}; // Limpiar selección del usuario actual
            location.reload(); 
        });
    }

    function publicarOficiales() { db.ref('oficial_historial/' + CONFIG.jornada).set(SEL_ADMIN).then(()=>alert('Marcadores Publicados ✅')); }
    function setS(id, v) { SEL_USER[id] = (SEL_USER[id] === v) ? null : v; renderPartidos(); }
    function setO(id, v) { SEL_ADMIN[id] = (SEL_ADMIN[id] === v) ? null : v; renderPartidos(); }
    
    function guardarJugada() {
        const n = document.getElementById('nombreInput').value.trim();
        if(!n || Object.keys(SEL_USER).length < 9) return alert("Quiniela incompleta");
        db.ref('jugadas').push({ nombre: n, votos: SEL_USER, pagado: false, jornada: CONFIG.jornada, timestamp: firebase.database.ServerValue.TIMESTAMP });
        document.getElementById('registro-area').style.display='none'; 
        document.getElementById('ticket-final').style.display='block';
        let t = `👤 ${n.toUpperCase()}\n⚽ ${CONFIG.jornada}\n--------------------\n`; 
        PARTIDOS.forEach(p => { t += `${p.l} vs ${p.v}: [${SEL_USER[p.id]}]\n`; });
        document.getElementById('mensaje-texto').innerText = t;
    }

    function resetRegistro() { SEL_USER = {}; document.getElementById('nombreInput').value = ''; document.getElementById('registro-area').style.display='block'; document.getElementById('ticket-final').style.display='none'; renderPartidos(); }
    function cambiarPagina(dir) { PAGINA = Math.max(0, dir === 0 ? 0 : PAGINA + dir); renderAdminParticipantes(); }
    function showTab(t) { document.querySelectorAll('.content').forEach(c=>c.classList.remove('active')); document.getElementById(t).classList.add('active'); document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); event.currentTarget.classList.add('active'); }
    function activarAdmin() { if(prompt("PIN:")==="1234") document.getElementById('btn-admin').style.display='block'; }
    function actualizarFinanzas() { let si=0, no=0; JUGADAS_ALL.filter(j => !j.jornada || j.jornada === CONFIG.jornada).forEach(j=>{ if(j.pagado) si+=parseInt(CONFIG.costo); else no+=parseInt(CONFIG.costo); }); document.getElementById('fin-si').innerText=`$${si}`; document.getElementById('fin-no').innerText=`$${no}`; }
    function copiarAlPortapapeles() { navigator.clipboard.writeText(document.getElementById('mensaje-texto').innerText).then(()=>alert("Copiado ✅")); }
    window.onload = renderPartidos;
</script>
</body>
</html>
