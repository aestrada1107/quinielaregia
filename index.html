<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUINIELAS REGIAS - YEMI PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --verde: #006847; --rojo: #CE1126; --azul: #007bff; --oro: #fff3cd; --oro-txt: #856404; --oscuro: #222; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; margin: 0; padding: 10px; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 600px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header-main { background: var(--verde); color: white; padding: 20px; text-align: center; border-bottom: 5px solid var(--rojo); }
        .header-main h1 { margin: 0; font-size: 1.5em; text-transform: uppercase; letter-spacing: 2px; }
        .tabs { display: flex; background: var(--oscuro); }
        .tab-btn { flex: 1; padding: 15px; color: #bbb; border: none; background: none; cursor: pointer; font-weight: bold; font-size: 0.85em; }
        .tab-btn.active { color: white; background: var(--verde); border-bottom: 4px solid var(--rojo); }
        .content { padding: 15px; display: none; }
        .content.active { display: block; }
        .partido-card { background: #fff; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 12px; padding: 12px; }
        .serie-header { font-size: 0.7em; font-weight: bold; color: #777; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .partido-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .equipo { font-weight: 700; width: 30%; font-size: 0.85em; text-align: center; color: #333; }
        .lev-container { display: flex; gap: 4px; width: 40%; }
        .btn-lev { border: 1px solid #ccc; background: #fdfdfd; padding: 10px 0; border-radius: 6px; font-weight: 900; flex: 1; color: #666; cursor: pointer; font-size: 0.8em; }
        .btn-lev.selected { background: var(--verde); color: white; border-color: var(--verde); }
        .btn-lev.real { background: var(--rojo); color: white; border-color: var(--rojo); }
        .avanza-box { background: #f0f7f4; border-radius: 8px; padding: 8px; margin-top: 5px; border: 1px dashed var(--verde); display: flex; align-items: center; justify-content: space-around; }
        .btn-avanza { padding: 6px 12px; border-radius: 20px; border: 1px solid #ccc; font-size: 0.75em; cursor: pointer; font-weight: bold; }
        .btn-avanza.selected { background: var(--azul); color: white; border-color: var(--azul); }
        .btn-main { width: 100%; padding: 18px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
        th, td { padding: 12px 8px; border-bottom: 1px solid #eee; text-align: left; }
        .ganador-row { background: var(--oro) !important; color: var(--oro-txt) !important; font-weight: bold; }
        .admin-card { background: #f9f9f9; padding: 15px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 15px; }
        input[type="text"], input[type="number"], select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; margin-bottom: 10px; }
        .status-box { background: #fff3cd; color: #856404; padding: 10px; border-radius: 8px; text-align: center; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="modal-ver" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; overflow-y:auto; color: white; padding: 20px;">
    <div style="background:white; margin:10% auto; padding:20px; width:90%; border-radius:12px; max-width:400px; color: #333;">
        <h3 id="modal-nombre" style="text-align:center; color:var(--verde);"></h3>
        <div id="modal-detalle"></div>
        <button onclick="document.getElementById('modal-ver').style.display='none'" class="btn-main" style="background:#333;">CERRAR</button>
    </div>
</div>

<div class="container">
    <div class="header-main">
        <h1 id="main-title">QU<span>I</span>N<span>I</span>ELAS REGIAS</h1>
        <p id="display-jornada" style="margin: 5px 0 0; font-weight: bold; opacity: 0.9;">---</p>
    </div>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('jugador')">REGISTRO</button>
        <button class="tab-btn" onclick="showTab('posiciones')">TABLA</button>
        <button class="tab-btn" id="btn-admin" style="display:none;" onclick="showTab('admin')">ADMIN</button>
    </div>

    <div id="jugador" class="content active">
        <div id="area-cerrada" class="status-box" style="display:none;">🚫 REGISTROS CERRADOS</div>
        <div id="registro-area">
            <input type="text" id="nombreInput" placeholder="Nombre completo">
            <div id="lista-jugador"></div>
            <button class="btn-main" style="background: var(--verde)" onclick="guardarJugada()">✅ GENERAR TICKET</button>
        </div>
        <div id="ticket-final" style="display:none; border:2px solid var(--verde); padding:15px; border-radius:8px; margin-top:10px;">
            <div id="mensaje-texto" style="white-space:pre-wrap; font-family:monospace; background:#f4f4f4; padding:10px; font-size:0.85em;"></div>
            <button onclick="copiarAlPortapapeles()" class="btn-main" style="background: var(--azul);">📋 COPIAR WHATSAPP</button>
            <button onclick="location.reload()" style="width:100%; border:none; background:none; color:gray; margin-top:15px; cursor:pointer;">Registrar otra</button>
        </div>
    </div>

    <div id="posiciones" class="content">
        <div style="margin-bottom:10px; text-align:right;">
            <select id="filtro-tabla" onchange="calcularLeaderboard()"></select>
        </div>
        <div id="render-puntos"></div>
    </div>

    <div id="admin" class="content">
        <div class="admin-card" style="background: #e3f2fd;">
            <h4>⚙️ Configuración Global</h4>
            <label>Modo de Juego:</label>
            <select id="cfg-modo" onchange="actualizarModo(this.value)">
                <option value="NORMAL">Jornada Regular (9 juegos)</option>
                <option value="LIGUILLA">Liguilla (IDA/VUELTA + Avanza)</option>
            </select>
            <label>Estado:</label>
            <button id="btn-toggle-cierre" onclick="toggleCierre()" style="width:100%; padding:10px; margin-bottom:10px; font-weight:bold;"></button>
        </div>

        <div class="admin-card">
            <h4>🚀 Lanzar Nueva Etapa</h4>
            <input type="text" id="new-jornada" placeholder="Ej: SEMIFINALES">
            <input type="number" id="new-costo" placeholder="Costo $">
            <div id="editor-dinamico"></div>
            <button class="btn-main" style="background: var(--azul)" onclick="lanzarEtapa()">PUBLICAR ETAPA</button>
        </div>

        <div class="admin-card">
            <h4>⚽ Marcadores Oficiales</h4>
            <div id="lista-admin"></div>
            <button class="btn-main" style="background: var(--rojo)" onclick="publicarResultados()">GUARDAR RESULTADOS</button>
        </div>

        <div class="admin-card">
            <h4>👥 Pagos y Participantes</h4>
            <input type="text" id="buscador" placeholder="🔍 Buscar..." oninput="renderAdminParticipantes()">
            <div id="admin-participantes"></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBgmqQLnUIPuaDgXOEvuBAoY_mcd69Qw7E", authDomain: "quinielaligamx-68b52.firebaseapp.com", databaseURL: "https://quinielaligamx-68b52-default-rtdb.firebaseio.com", projectId: "quinielaligamx-68b52", storageBucket: "quinielaligamx-68b52.firebasestorage.app", messagingSenderId: "745257098090", appId: "1:745257098090:web:3c13bf19a1a0c1718ca313" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let DATA = { config: {}, partidos: [], jugadas: {}, oficial_historial: {} };
    let SEL_USER = {}, SEL_ADMIN = {};

    db.ref().on('value', snap => {
        DATA = snap.val() || { config: { modo: 'NORMAL', cerrada: false, jornada: 'J1' }, partidos: [] };
        actualizarUI();
    });

    function actualizarUI() {
        const conf = DATA.config;
        document.getElementById('display-jornada').innerText = conf.jornada;
        document.getElementById('cfg-modo').value = conf.modo;
        
        const btnC = document.getElementById('btn-toggle-cierre');
        btnC.innerText = conf.cerrada ? "🔓 ABRIR REGISTROS" : "🔒 CERRAR REGISTROS";
        btnC.style.background = conf.cerrada ? "#28a745" : "#dc3545";
        btnC.style.color = "white";

        document.getElementById('area-cerrada').style.display = conf.cerrada ? 'block' : 'none';
        document.getElementById('registro-area').style.display = conf.cerrada ? 'none' : 'block';

        const resAct = DATA.oficial_historial[conf.jornada] || {};
        if(Object.keys(SEL_ADMIN).length === 0) SEL_ADMIN = JSON.parse(JSON.stringify(resAct));

        renderListaPartidos();
        renderEditor();
        renderAdminParticipantes();
        actualizarSelectJornadas();
        calcularLeaderboard();
    }

    function renderListaPartidos() {
        const dj = document.getElementById('lista-jugador'), da = document.getElementById('lista-admin');
        dj.innerHTML = ''; da.innerHTML = '';
        
        DATA.partidos.forEach(p => {
            const esLiguilla = DATA.config.modo === 'LIGUILLA';
            const html = (sel, cb, isReal) => `
                <div class="partido-card">
                    ${esLiguilla ? `<div class="serie-header"><span>SERIE ${p.serie}</span> <span>${p.tipo}</span></div>` : ''}
                    <div class="partido-row">
                        <div class="equipo">${p.l}</div>
                        <div class="lev-container">
                            ${['L','E','V'].map(v => `<button class="btn-lev ${sel[p.id]===v ? (isReal?'real':'selected'):''}" onclick="${cb}(${p.id},'${v}')">${v}</button>`).join('')}
                        </div>
                        <div class="equipo">${p.v}</div>
                    </div>
                    ${esLiguilla && p.tipo === 'VUELTA' ? `
                        <div class="avanza-box">
                            <span style="font-size:0.7em; font-weight:bold;">AVANZA (+1pt):</span>
                            <button class="btn-avanza ${sel['avanza_'+p.serie]===p.l?'selected':''}" onclick="${cb}('avanza_${p.serie}','${p.l}')">${p.l}</button>
                            <button class="btn-avanza ${sel['avanza_'+p.serie]===p.v?'selected':''}" onclick="${cb}('avanza_${p.serie}','${p.v}')">${p.v}</button>
                        </div>
                    ` : ''}
                </div>`;
            dj.innerHTML += html(SEL_USER, 'setS', false);
            da.innerHTML += html(SEL_ADMIN, 'setO', true);
        });
    }

    function renderEditor() {
        const div = document.getElementById('editor-dinamico'); if(div.innerHTML !== "") return;
        const num = DATA.config.modo === 'LIGUILLA' ? 8 : 9;
        for(let i=1; i<=num; i++) {
            const label = DATA.config.modo === 'LIGUILLA' ? (i%2!==0?`Serie ${(i+1)/2} Ida`:`Serie ${i/2} Vuelta`) : `Partido ${i}`;
            div.innerHTML += `<div style="margin-bottom:8px;"><small>${label}</small><div style="display:flex;gap:4px;"><input type="text" id="edit-l-${i}" placeholder="Local"><input type="text" id="edit-v-${i}" placeholder="Visita"></div></div>`;
        }
    }

    function lanzarEtapa() {
        const jor = document.getElementById('new-jornada').value.toUpperCase();
        const modo = DATA.config.modo;
        const num = modo === 'LIGUILLA' ? 8 : 9;
        const partidos = [];
        for(let i=1; i<=num; i++){
            partidos.push({
                id: i, 
                l: document.getElementById(`edit-l-${i}`).value || "L"+i,
                v: document.getElementById(`edit-v-${i}`).value || "V"+i,
                tipo: modo === 'LIGUILLA' ? (i%2!==0?'IDA':'VUELTA') : 'NORMAL',
                serie: modo === 'LIGUILLA' ? Math.ceil(i/2) : null
            });
        }
        db.ref().update({
            'config/jornada': jor,
            'config/costo': document.getElementById('new-costo').value || 10,
            'config/cerrada': false,
            'partidos': partidos
        }).then(()=>location.reload());
    }

    function calcularLeaderboard() {
        const jorSel = document.getElementById('filtro-tabla').value || DATA.config.jornada;
        const resOfi = DATA.oficial_historial[jorSel] || {};
        const jugadas = Object.values(DATA.jugadas || {}).filter(j => j.jornada === jorSel && j.pagado);
        
        let tabla = jugadas.map(j => {
            let pts = 0;
            // Puntos LEV
            DATA.partidos.forEach(p => { if(resOfi[p.id] && String(j.votos[p.id]) === String(resOfi[p.id])) pts++; });
            // Puntos Avanza (Extra)
            if(DATA.config.modo === 'LIGUILLA') {
                [1,2,3,4].forEach(s => { if(resOfi['avanza_'+s] && j.votos['avanza_'+s] === resOfi['avanza_'+s]) pts++; });
            }
            return { n: j.nombre, p: pts, t: j.timestamp };
        }).sort((a,b) => b.p - a.p || a.t - b.t);

        let h = '<table><tr><th>Pos</th><th>Nombre</th><th>Pts</th></tr>';
        tabla.forEach((it, i) => { h += `<tr class="${i===0 && it.p>0?'ganador-row':''}"><td>${i+1}</td><td>${it.n}</td><td><strong>${it.p}</strong></td></tr>`; });
        document.getElementById('render-puntos').innerHTML = h + '</table>';
    }

    function guardarJugada() {
        const n = document.getElementById('nombreInput').value.trim();
        const numReq = DATA.config.modo === 'LIGUILLA' ? 12 : 9; // 8 juegos + 4 avanza
        if(!n || Object.keys(SEL_USER).length < numReq) return alert("Completa todos los pronósticos");
        
        db.ref('jugadas').push({ nombre: n, votos: SEL_USER, pagado: false, jornada: DATA.config.jornada, timestamp: firebase.database.ServerValue.TIMESTAMP });
        document.getElementById('registro-area').style.display='none';
        document.getElementById('ticket-final').style.display='block';
        
        let t = `👤 ${n.toUpperCase()}\n⚽ ${DATA.config.jornada}\n--------------------\n`;
        DATA.partidos.forEach(p => {
            t += `${p.tipo==='NORMAL'?'':p.tipo+': '}${p.l} vs ${p.v} [${SEL_USER[p.id]}]\n`;
            if(p.tipo === 'VUELTA') t += `>> AVANZA: ${SEL_USER['avanza_'+p.serie]}\n`;
        });
        document.getElementById('mensaje-texto').innerText = t;
    }

    // Funciones Helper
    function setS(id, v) { SEL_USER[id] = v; renderListaPartidos(); }
    function setO(id, v) { SEL_ADMIN[id] = v; renderListaPartidos(); }
    function toggleCierre() { db.ref('config').update({ cerrada: !DATA.config.cerrada }); }
    function actualizarModo(v) { db.ref('config').update({ modo: v }).then(()=>location.reload()); }
    function publicarResultados() { db.ref('oficial_historial/'+DATA.config.jornada).set(SEL_ADMIN).then(()=>alert("Resultados Guardados")); }
    function showTab(t) { document.querySelectorAll('.content').forEach(c=>c.classList.remove('active')); document.getElementById(t).classList.add('active'); document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); event.currentTarget.classList.add('active'); }
    function copiarAlPortapapeles() { navigator.clipboard.writeText(document.getElementById('mensaje-texto').innerText).then(()=>alert("Copiado ✅")); }
    function actualizarSelectJornadas() {
        const sel = document.getElementById('filtro-tabla');
        const jornadas = [...new Set(Object.values(DATA.jugadas || {}).map(j => j.jornada))];
        if(!jornadas.includes(DATA.config.jornada)) jornadas.push(DATA.config.jornada);
        sel.innerHTML = jornadas.map(j => `<option value="${j}" ${j===DATA.config.jornada?'selected':''}>${j}</option>`).join('');
    }
    function renderAdminParticipantes() {
        const div = document.getElementById('admin-participantes'); div.innerHTML = '';
        const bus = document.getElementById('buscador').value.toLowerCase();
        Object.keys(DATA.jugadas || {}).forEach(id => {
            const j = DATA.jugadas[id];
            if(j.jornada === DATA.config.jornada && j.nombre.toLowerCase().includes(bus)){
                div.innerHTML += `<div class="partido-card" style="display:flex; justify-content:space-between; align-items:center;">
                    <span>${j.nombre}</span>
                    <div>
                        <button style="background:${j.pagado?'var(--verde)':'#ccc'}; color:white; border:none; padding:5px 10px; border-radius:4px;" onclick="db.ref('jugadas/${id}').update({pagado:${!j.pagado}})">${j.pagado?'$':'X'}</button>
                    </div>
                </div>`;
            }
        });
    }
    function activarAdmin() {
        const spans = document.querySelectorAll('#main-title span');
        if (spans.length >= 2) {
            spans[1].style.cursor = "pointer";
            spans[1].onclick = () => { if(prompt("PIN:")==="1234") document.getElementById('btn-admin').style.display='block'; };
        }
    }
    window.onload = activarAdmin;
</script>
</body>
</html>
