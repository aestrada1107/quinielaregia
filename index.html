<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUINIELAS REGIAS - YEMI</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --verde: #006847; --rojo: #CE1126; --azul: #007bff; --oro: #fff3cd; --oro-txt: #856404; --oscuro: #222; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; margin: 0; padding: 10px; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 600px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header-main { background: var(--verde); color: white; padding: 20px; text-align: center; border-bottom: 5px solid var(--rojo); }
        .header-main h1 { margin: 0; font-size: 1.5em; text-transform: uppercase; letter-spacing: 1px; }
        .tabs { display: flex; background: var(--oscuro); }
        .tab-btn { flex: 1; padding: 15px; color: #bbb; border: none; background: none; cursor: pointer; font-weight: bold; font-size: 0.85em; }
        .tab-btn.active { color: white; background: var(--verde); border-bottom: 4px solid var(--rojo); }
        .content { padding: 15px; display: none; }
        .content.active { display: block; }
        .partido-card { background: #fff; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 12px; padding: 12px; display: flex; align-items: center; justify-content: space-between; }
        .equipo { font-weight: 700; width: 30%; font-size: 0.85em; text-align: center; color: #333; }
        .lev-container { display: flex; gap: 5px; width: 40%; }
        .btn-lev { border: 2px solid #ccc; background: #fdfdfd; padding: 12px 0; border-radius: 8px; font-weight: 900; flex: 1; color: #666; cursor: pointer; }
        .btn-lev.selected { background: var(--verde); color: white; border-color: var(--verde); }
        .btn-lev.real { background: var(--rojo); color: white; border-color: var(--rojo); }
        .btn-main { width: 100%; padding: 18px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9em; }
        th, td { padding: 12px 8px; border-bottom: 1px solid #eee; text-align: left; }
        .ganador-row { background: var(--oro) !important; color: var(--oro-txt) !important; font-weight: bold; }
        .ticket-box { background: #fff; border: 2px solid var(--verde); padding: 15px; border-radius: 8px; margin-top: 10px; display: none; }
        .ticket-text { font-family: monospace; background: #f4f4f4; padding: 10px; white-space: pre-wrap; font-size: 0.9em; border-radius: 4px; border: 1px solid #ddd; }
        input[type="text"], input[type="number"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; margin-bottom: 10px; }
        .admin-card { background: #f9f9f9; padding: 15px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 15px; }
        .paginacion { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .btn-pag { padding: 8px 15px; background: var(--oscuro); color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-main">
        <h1>🇲🇽 QUINIELAS REGIAS 🇲🇽</h1>
        <p id="display-jornada">CARGANDO...</p>
    </div>

    <div style="text-align:center; padding:10px; border-bottom: 1px solid #eee;">
        <h2 style="font-size: 0.8em; color: #bbb;">Panel de <span onclick="activarAdmin()" style="cursor:pointer; color: #ccc;">Acceso</span></h2>
    </div>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('jugador')">REGISTRO</button>
        <button class="tab-btn" onclick="showTab('posiciones')">TABLA</button>
        <button class="tab-btn" id="btn-admin" style="display:none;" onclick="showTab('admin')">ADMIN PRO</button>
    </div>

    <div id="jugador" class="content active">
        <div id="form-registro">
            <input type="text" id="nombreInput" placeholder="Escribe tu nombre completo">
            <div id="lista-jugador"></div>
            <button class="btn-main" style="background: var(--verde)" onclick="guardarJugada()">✅ GENERAR TICKET</button>
        </div>
        <div id="ticket-final" class="ticket-box">
            <h3 style="text-align:center; color:var(--verde); margin-top:0;">🎟️ TICKET LISTO</h3>
            <div id="mensaje-texto" class="ticket-text"></div>
            <button onclick="copiarAlPortapapeles()" class="btn-main" style="background: var(--azul); margin-top:10px;">📋 COPIAR TEXTO</button>
            <button onclick="location.reload()" style="width:100%; border:none; background:none; color:gray; margin-top:15px; cursor:pointer;">Registrar otra</button>
        </div>
    </div>

    <div id="posiciones" class="content">
        <h3 style="text-align:center; color: var(--verde);">Tabla General 🏆</h3>
        <div id="render-puntos"></div>
    </div>

    <div id="admin" class="content">
        <div class="admin-card" style="display:flex; justify-content:space-between; font-weight:bold;">
            <span>Cobrado: <strong id="fin-si" style="color:var(--verde)">$0</strong></span>
            <span>Pendiente: <strong id="fin-no" style="color:var(--rojo)">$0</strong></span>
        </div>

        <div class="admin-card">
            <h4 style="margin-top:0;">📝 Configurar Jornada</h4>
            <input type="text" id="cfg-jornada" placeholder="Nombre de la Jornada (Ej: JORNADA 11)">
            <input type="number" id="cfg-costo" placeholder="Costo de Quiniela $">
            <div id="editor-equipos"></div>
            <button class="btn-main" style="background: var(--azul); padding: 10px;" onclick="guardarConfigYEquipos()">💾 ACTUALIZAR JORNADA</button>
        </div>

        <div class="admin-card">
            <h4>⚽ Marcadores Oficiales</h4>
            <div id="lista-admin"></div>
            <button class="btn-main" style="background: var(--rojo); margin-top:10px;" onclick="publicarOficiales()">📢 PUBLICAR RESULTADOS</button>
        </div>

        <div class="admin-card">
            <h4>👥 Participantes</h4>
            <input type="text" id="buscador" placeholder="🔍 Buscar por nombre..." oninput="cambiarPagina(0)">
            <table>
                <thead><tr style="background:#eee;"><th>Nombre</th><th style="text-align:right;">Pago / Ver</th></tr></thead>
                <tbody id="admin-participantes"></tbody>
            </table>
            <div class="paginacion">
                <button class="btn-pag" onclick="cambiarPagina(-1)">« Ant</button>
                <span id="page-info">Pág 1</span>
                <button class="btn-pag" onclick="cambiarPagina(1)">Sig »</button>
            </div>
        </div>

        <button onclick="if(confirm('¿BORRAR TODO?')) db.ref().remove()" class="btn-main" style="background:black; margin-top:30px; font-size:0.7em;">🚨 RESET TOTAL BASE DE DATOS</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBgmqQLnUIPuaDgXOEvuBAoY_mcd69Qw7E", authDomain: "quinielaligamx-68b52.firebaseapp.com", databaseURL: "https://quinielaligamx-68b52-default-rtdb.firebaseio.com", projectId: "quinielaligamx-68b52", storageBucket: "quinielaligamx-68b52.firebasestorage.app", messagingSenderId: "745257098090", appId: "1:745257098090:web:3c13bf19a1a0c1718ca313" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const EQUIPOS_INIT = [{id:1,l:"Mazatlán",v:"León"},{id:2,l:"Necaxa",v:"Pumas"},{id:3,l:"Cruz Azul",v:"Atl. San Luis"},{id:4,l:"Querétaro",v:"América"},{id:5,l:"Pachuca",v:"Puebla"},{id:6,l:"Atlas",v:"Chivas"},{id:7,l:"Tigres",v:"Monterrey"},{id:8,l:"Toluca",v:"FC Juárez"},{id:9,l:"Tijuana",v:"Santos"}];
    
    let JUGADAS = [], OFICIALES = {}, SEL_USER = {}, SEL_ADMIN = {}, PARTIDOS = EQUIPOS_INIT, CONFIG = {costo:10, jornada:""}, paginaActual = 0;

    // ESCUCHA MAESTRA
    db.ref().on('value', snap => {
        const d = snap.val() || {};
        CONFIG = d.config || {costo:10, jornada:"JORNADA 10"};
        PARTIDOS = d.partidos || EQUIPOS_INIT;
        OFICIALES = d.oficial || {};
        
        if(Object.keys(SEL_ADMIN).length === 0) SEL_ADMIN = JSON.parse(JSON.stringify(OFICIALES));
        JUGADAS = d.jugadas ? Object.keys(d.jugadas).map(k => ({id: k, ...d.jugadas[k]})) : [];
        
        document.getElementById('display-jornada').innerText = CONFIG.jornada;
        document.getElementById('cfg-jornada').value = CONFIG.jornada;
        document.getElementById('cfg-costo').value = CONFIG.costo;

        renderPartidos();
        renderEditor();
        renderAdminParticipantes();
        calcularPuntos();
        actualizarFinanzas();
    });

    function renderPartidos() {
        const dj = document.getElementById('lista-jugador'), da = document.getElementById('lista-admin');
        dj.innerHTML = ''; da.innerHTML = '';
        PARTIDOS.forEach(p => {
            const base = `<div class="partido-card"><div class="equipo">${p.l}</div><div class="lev-container">`;
            dj.innerHTML += base + `<button class="btn-lev ${SEL_USER[p.id]==='L'?'selected':''}" onclick="setS(${p.id},'L')">L</button><button class="btn-lev ${SEL_USER[p.id]==='E'?'selected':''}" onclick="setS(${p.id},'E')">E</button><button class="btn-lev ${SEL_USER[p.id]==='V'?'selected':''}" onclick="setS(${p.id},'V')">V</button></div><div class="equipo">${p.v}</div></div>`;
            da.innerHTML += base + `<button class="btn-lev ${SEL_ADMIN[p.id]==='L'?'real':''}" onclick="setO(${p.id},'L')">L</button><button class="btn-lev ${SEL_ADMIN[p.id]==='E'?'real':''}" onclick="setO(${p.id},'E')">E</button><button class="btn-lev ${SEL_ADMIN[p.id]==='V'?'real':''}" onclick="setO(${p.id},'V')">V</button></div><div class="equipo">${p.v}</div></div>`;
        });
    }

    function renderEditor() {
        const div = document.getElementById('editor-equipos'); div.innerHTML = '';
        PARTIDOS.forEach(p => {
            div.innerHTML += `<div style="display:flex; gap:5px; margin-bottom:5px;">
                <input type="text" id="edit-l-${p.id}" value="${p.l}" style="margin:0; font-size:0.8em;">
                <input type="text" id="edit-v-${p.id}" value="${p.v}" style="margin:0; font-size:0.8em;">
            </div>`;
        });
    }

    function renderAdminParticipantes() {
        const body = document.getElementById('admin-participantes'); body.innerHTML = '';
        const bus = document.getElementById('buscador').value.toLowerCase();
        let filtrados = JUGADAS.filter(j => j.nombre.toLowerCase().includes(bus));
        
        let totalPags = Math.ceil(filtrados.length / 10) || 1;
        document.getElementById('page-info').innerText = `Pág ${paginaActual + 1} de ${totalPags}`;
        
        let mostrar = filtrados.slice(paginaActual * 10, (paginaActual * 10) + 10);
        
        mostrar.forEach(j => {
            body.innerHTML += `<tr><td><strong>${j.nombre}</strong></td><td style="text-align:right;">
                <button class="btn-lev ${j.pagado?'selected':''}" style="padding:5px 10px; min-width:35px;" onclick="db.ref('jugadas/${j.id}').update({pagado:${!j.pagado}})">${j.pagado?'$':'X'}</button>
                <button onclick="if(confirm('¿Borrar?')) db.ref('jugadas/${j.id}').remove()" style="margin-left:5px; border:none; background:none; cursor:pointer;">🗑️</button>
            </td></tr>`;
        });
    }

    function calcularPuntos() {
        const div = document.getElementById('render-puntos');
        if(!JUGADAS.length) return div.innerHTML = "<p style='text-align:center'>No hay participantes aún.</p>";
        let t = JUGADAS.map(j => {
            let pts = 0;
            PARTIDOS.forEach(p => {
                if(OFICIALES[p.id] && String(j.votos[p.id]) === String(OFICIALES[p.id])) pts++;
            });
            return { nombre: j.nombre, pts: pts, ts: j.timestamp || 0 };
        }).sort((a,b) => b.pts - a.pts || a.ts - b.ts);
        const top = t[0].pts;
        let h = '<table><tr><th>Pos</th><th>Nombre</th><th>Pts</th></tr>';
        t.forEach((it, i) => {
            const win = (top > 0 && it.pts === top && i === 0);
            h += `<tr class="${win?'ganador-row':''}"><td>${i+1}</td><td>${it.nombre}${win?' 🏆':''}</td><td><strong>${it.pts}</strong></td></tr>`;
        });
        div.innerHTML = h + '</table>';
    }

    function guardarConfigYEquipos() {
        const nuevosEquipos = PARTIDOS.map(p => ({
            id: p.id,
            l: document.getElementById(`edit-l-${p.id}`).value,
            v: document.getElementById(`edit-v-${p.id}`).value
        }));
        const nuevaConfig = {
            jornada: document.getElementById('cfg-jornada').value.toUpperCase(),
            costo: document.getElementById('cfg-costo').value
        };
        db.ref().update({ config: nuevaConfig, partidos: nuevosEquipos }).then(() => alert('Jornada Actualizada ✅'));
    }

    function setS(id, v) { SEL_USER[id] = (SEL_USER[id] === v) ? null : v; renderPartidos(); }
    function setO(id, v) { SEL_ADMIN[id] = (SEL_ADMIN[id] === v) ? null : v; renderPartidos(); }
    function publicarOficiales() { db.ref('oficial').set(SEL_ADMIN).then(()=>alert('📢 Marcadores Publicados')); }
    function cambiarPagina(dir) { 
        if(dir === 0) paginaActual = 0;
        else paginaActual = Math.max(0, Math.min(paginaActual + dir, Math.ceil(JUGADAS.length / 10) - 1));
        renderAdminParticipantes(); 
    }

    function guardarJugada() {
        const n = document.getElementById('nombreInput').value.trim();
        if(!n || Object.keys(SEL_USER).length < 9) return alert("Completa los 9 partidos.");
        db.ref('jugadas').push({ nombre: n, votos: SEL_USER, pagado: false, timestamp: firebase.database.ServerValue.TIMESTAMP });
        document.getElementById('form-registro').style.display='none'; document.getElementById('ticket-final').style.display='block';
        let t = `👤 ${n.toUpperCase()}\n--------------------\n`; EQUIPOS.forEach(p => { t += `${p.l} vs ${p.v}: [${SEL_USER[p.id]}]\n`; });
        document.getElementById('mensaje-texto').innerText = t;
    }

    function showTab(t) { document.querySelectorAll('.content').forEach(c=>c.classList.remove('active')); document.getElementById(t).classList.add('active'); }
    function activarAdmin() { if(prompt("PIN:")==="1234") document.getElementById('btn-admin').style.display='block'; }
    function actualizarFinanzas() { let si=0, no=0; JUGADAS.forEach(j=>{ if(j.pagado) si+=parseInt(CONFIG.costo); else no+=parseInt(CONFIG.costo); }); document.getElementById('fin-si').innerText=`$${si}`; document.getElementById('fin-no').innerText=`$${no}`; }
    function copiarAlPortapapeles() { navigator.clipboard.writeText(document.getElementById('mensaje-texto').innerText).then(()=>alert("Copiado ✅")); }
    window.onload = renderPartidos;
</script>
</body>
</html>
