<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUINIELAS REGIAS - YEMI</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --verde: #006847; --blanco: #ffffff; --rojo: #CE1126; --gris: #f4f4f4; --pago-si: #28a745; --pago-no: #dc3545; --azul: #007bff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gris); margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: auto; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header-main { background: var(--verde); color: white; padding: 20px; text-align: center; border-bottom: 5px solid var(--rojo); }
        .header-main h1 { margin: 0; font-size: 1.5em; text-transform: uppercase; letter-spacing: 1px; }
        .header-main p { margin: 5px 0 0; font-weight: bold; font-size: 0.9em; opacity: 0.9; min-height: 1.2em; }
        .header-title { background: white; padding: 15px; text-align: center; border-bottom: 1px solid #eee; }
        .tabs { display: none; background: #222; }
        .tab-btn { flex: 1; padding: 15px; color: #bbb; border: none; background: none; cursor: pointer; font-weight: bold; }
        .tab-btn.active { color: white; background: var(--verde); border-bottom: 4px solid var(--rojo); }
        .content { padding: 20px; display: none; }
        .content.active { display: block; }
        .partido-card { background: #fff; border: 1px solid #eee; border-radius: 8px; margin-bottom: 10px; padding: 12px; display: flex; align-items: center; justify-content: space-between; }
        .equipo { font-weight: bold; width: 32%; font-size: 0.85em; text-align: center; }
        .btn-lev { border: 2px solid #ddd; background: white; padding: 8px 10px; border-radius: 6px; font-weight: bold; cursor:pointer; min-width: 40px; }
        .btn-lev.selected { background: var(--verde); color: white; border-color: var(--verde); }
        .btn-lev.real { background: var(--rojo); color: white; border-color: var(--rojo); }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; margin-bottom: 5px; }
        .btn-main { width: 100%; padding: 15px; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        th, td { padding: 10px 5px; border-bottom: 1px solid #eee; text-align: left; }
        .pagination { display: flex; justify-content: space-between; margin-top: 10px; align-items: center; }
        .btn-pag { padding: 5px 15px; background: #333; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #modal-jugada { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; overflow-y: auto; }
        .modal-content { background:white; margin:10% auto; padding:20px; width:85%; max-width:400px; border-radius:10px; }
        .info-fecha { font-size: 0.75em; color: #666; margin-bottom: 10px; border-bottom: 1px dashed #ccc; padding-bottom: 5px; }
    </style>
</head>
<body>

<div id="modal-jugada">
    <div class="modal-content">
        <h3 id="modal-nombre" style="margin:0; color:var(--verde);"></h3>
        <div id="modal-fecha" class="info-fecha"></div>
        <div id="modal-detalle"></div>
        <button onclick="cerrarModal()" class="btn-main" style="background:#333; margin-top:15px;">CERRAR</button>
    </div>
</div>

<div class="container">
    <div class="header-main">
        <h1>🇲🇽 QUINIELAS REGIAS 🇲🇽</h1>
        <p id="display-jornada"></p>
    </div>
    <div class="header-title"><h2>Qu<span onclick="activarModoMaestro()" style="cursor:default">i</span>niela Control</h2></div>
    
    <div class="tabs" id="barra-tabs">
        <button class="tab-btn active" onclick="showTab('jugador')">REGISTRAR</button>
        <button class="tab-btn" onclick="showTab('posiciones')">TABLA</button>
        <button class="tab-btn" onclick="showTab('admin')">ADMIN</button>
    </div>

    <div id="jugador" class="content active">
        <input type="text" id="nombreInput" placeholder="Nombre del participante">
        <div id="lista-jugador"></div>
        <button class="btn-main" style="background: var(--verde)" onclick="guardarJugada()">✅ GENERAR TICKET</button>
    </div>

    <div id="posiciones" class="content"><div id="posiciones-render"></div></div>

    <div id="admin" class="content">
        <div style="background:#f8f9fa; padding:10px; border-radius:8px; border:1px solid #ddd; margin-bottom:15px;">
            <input type="text" id="cfg-jornada" placeholder="Nombre de Jornada (Ej. J10)">
            <input type="text" id="cfg-costo" placeholder="Costo de Inscripción $">
            <button onclick="guardarConfigGeneral()" style="width:100%; padding:8px; background:#333; color:white; border:none; border-radius:4px;">💾 GUARDAR CONFIG</button>
        </div>

        <details style="margin-bottom:15px; background:#eee; padding:10px; border-radius:8px;">
            <summary style="font-weight:bold; cursor:pointer;">✏️ EDITAR EQUIPOS SEMANALES</summary>
            <div id="editor-equipos" style="margin-top:10px;"></div>
            <button onclick="guardarNombresEquipos()" style="width:100%; background:var(--azul); color:white; border:none; padding:10px; border-radius:4px; margin-top:5px;">ACTUALIZAR EQUIPOS</button>
        </details>

        <div id="lista-admin"></div>
        <button class="btn-main" style="background: var(--rojo); margin-top:10px;" onclick="guardarResultadosOficiales()">PUBLICAR RESULTADOS</button>
        
        <hr>
        <h4>Participantes</h4>
        <table><thead><tr><th>Nombre</th><th>Acciones</th></tr></thead><tbody id="admin-participantes"></tbody></table>
        <div class="pagination">
            <button class="btn-pag" onclick="cambiarPagina(-1)">« Ant</button>
            <span id="page-info">Pág 1</span>
            <button class="btn-pag" onclick="cambiarPagina(1)">Sig »</button>
        </div>
        <button onclick="limpiarBaseDatos()" style="width:100%; background:black; color:white; padding:10px; border:none; border-radius:6px; margin-top:30px;">🚨 RESET TOTAL</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBgmqQLnUIPuaDgXOEvuBAoY_mcd69Qw7E",
        authDomain: "quinielaligamx-68b52.firebaseapp.com",
        databaseURL: "https://quinielaligamx-68b52-default-rtdb.firebaseio.com",
        projectId: "quinielaligamx-68b52",
        storageBucket: "quinielaligamx-68b52.firebasestorage.app",
        messagingSenderId: "745257098090",
        appId: "1:745257098090:web:3c13bf19a1a0c1718ca313"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const J10_BASE = [
        {id:1,l:"Mazatlán",v:"León"},{id:2,l:"Necaxa",v:"Pumas"},{id:3,l:"Cruz Azul",v:"Atl. San Luis"},
        {id:4,l:"Querétaro",v:"América"},{id:5,l:"Pachuca",v:"Puebla"},{id:6,l:"Atlas",v:"Chivas"},
        {id:7,l:"Tigres",v:"Monterrey"},{id:8,l:"Toluca",v:"FC Juárez"},{id:9,l:"Tijuana",v:"Santos"}
    ];

    let CONFIG = { costo: "10", jornada: "" };
    let PARTIDOS = J10_BASE;
    let todasLasJugadas = [];
    let resultadosOficiales = {};
    let seleccionActual = {};
    let paginaActual = 0;
    const itemsPorPagina = 10;

    db.ref('config').on('value', s => { if(s.val()){ CONFIG = s.val(); document.getElementById('display-jornada').innerText = CONFIG.jornada; } });
    db.ref('partidos').on('value', s => { PARTIDOS = s.val() || J10_BASE; renderPartidos(); renderEditorEquipos(); });
    db.ref('jugadas').on('value', s => { 
        todasLasJugadas = []; s.forEach(c => { todasLasJugadas.push({id:c.key, ...c.val()}); });
        todasLasJugadas.sort((a,b) => (a.timestamp || 0) - (b.timestamp || 0)); // Orden cronológico
        renderAdminParticipantes(); actualizarLeaderboard();
    });
    db.ref('oficial').on('value', s => { resultadosOficiales = s.val() || {}; renderPartidos(); });

    function renderPartidos() {
        const listJ = document.getElementById('lista-jugador'), listA = document.getElementById('lista-admin');
        listJ.innerHTML = ''; listA.innerHTML = '';
        PARTIDOS.forEach(p => {
            listJ.innerHTML += `<div class="partido-card"><div class="equipo">${p.l}</div><div><button class="btn-lev ${seleccionActual[p.id]==='L'?'selected':''}" onclick="setSel(${p.id},'L')">L</button><button class="btn-lev ${seleccionActual[p.id]==='E'?'selected':''}" onclick="setSel(${p.id},'E')">E</button><button class="btn-lev ${seleccionActual[p.id]==='V'?'selected':''}" onclick="setSel(${p.id},'V')">V</button></div><div class="equipo">${p.v}</div></div>`;
            listA.innerHTML += `<div class="partido-card"><div class="equipo">${p.l}</div><div><button class="btn-lev ${resultadosOficiales[p.id]==='L'?'real':''}" onclick="setOficial(${p.id},'L')">L</button><button class="btn-lev ${resultadosOficiales[p.id]==='E'?'real':''}" onclick="setOficial(${p.id},'E')">E</button><button class="btn-lev ${resultadosOficiales[p.id]==='V'?'real':''}" onclick="setOficial(${p.id},'V')">V</button></div><div class="equipo">${p.v}</div></div>`;
        });
    }

    function renderEditorEquipos() {
        const editor = document.getElementById('editor-equipos'); editor.innerHTML = '';
        PARTIDOS.forEach(p => {
            editor.innerHTML += `<div style="display:flex; gap:5px; margin-bottom:5px;"><input type="text" id="edit-l-${p.id}" value="${p.l}"><input type="text" id="edit-v-${p.id}" value="${p.v}"></div>`;
        });
    }

    function guardarNombresEquipos() {
        const nuevos = PARTIDOS.map(p => ({ id: p.id, l: document.getElementById(`edit-l-${p.id}`).value, v: document.getElementById(`edit-v-${p.id}`).value }));
        db.ref('partidos').set(nuevos); alert("Equipos actualizados ✅");
    }

    function renderAdminParticipantes() {
        const body = document.getElementById('admin-participantes'); body.innerHTML = '';
        const inicio = paginaActual * itemsPorPagina;
        const paginados = todasLasJugadas.slice(inicio, inicio + itemsPorPagina);
        paginados.forEach((j, idx) => {
            body.innerHTML += `<tr><td>${j.nombre}</td><td>
                <button onclick="verDetalle('${inicio+idx}')" style="background:#6c757d; color:white; border:none; padding:5px 8px; border-radius:4px;">👁️</button>
                <button class="status-pago ${j.pagado?'pago-si':'pago-no'}" onclick="togglePago('${j.id}',${j.pagado})">${j.pagado?'$':'X'}</button>
                <button onclick="eliminarJugador('${j.id}')" style="border:none; background:none;">🗑️</button>
            </td></tr>`;
        });
        document.getElementById('page-info').innerText = `Pág ${paginaActual + 1} de ${Math.ceil(todasLasJugadas.length/itemsPorPagina) || 1}`;
    }

    function cambiarPagina(dir) {
        paginaActual = Math.max(0, Math.min(paginaActual + dir, Math.ceil(todasLasJugadas.length / itemsPorPagina) - 1));
        renderAdminParticipantes();
    }

    function setSel(id, val) { if(seleccionActual[id]===val) delete seleccionActual[id]; else seleccionActual[id]=val; renderPartidos(); }
    function setOficial(id, val) { if(resultadosOficiales[id]===val) delete resultadosOficiales[id]; else resultadosOficiales[id]=val; renderPartidos(); }
    function togglePago(id, act) { db.ref('jugadas/'+id).update({pagado:!act}); }
    function eliminarJugador(id) { if(confirm("¿Borrar?")) db.ref('jugadas/'+id).remove(); }
    function guardarConfigGeneral() {
        const j = document.getElementById('cfg-jornada').value.toUpperCase();
        const c = document.getElementById('cfg-costo').value;
        db.ref('config').set({jornada: j, costo: c}); alert("Configuración guardada ✅");
    }
    function guardarResultadosOficiales() { db.ref('oficial').set(resultadosOficiales); alert("Resultados publicados ✅"); }
    function activarModoMaestro() { if(prompt("PIN:")==="1234") document.getElementById('barra-tabs').style.display='flex'; }
    function showTab(t) { 
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(t).classList.add('active'); event.currentTarget.classList.add('active');
    }
    function cerrarModal() { document.getElementById('modal-jugada').style.display='none'; }

    function verDetalle(idx) {
        const j = todasLasJugadas[idx];
        document.getElementById('modal-nombre').innerText = j.nombre;
        const fecha = j.timestamp ? new Date(j.timestamp).toLocaleString() : "Sin fecha";
        document.getElementById('modal-fecha').innerText = "📅 Registro: " + fecha;
        let h = '<ul style="list-style:none; padding:0;">';
        PARTIDOS.forEach(p => {
            const v = j.votos[p.id] || '?';
            const color = (resultadosOficiales[p.id] && v === resultadosOficiales[p.id]) ? 'green' : (resultadosOficiales[p.id] ? 'red' : 'black');
            h += `<li style="border-bottom:1px solid #eee; padding:5px; color:${color}; font-size:0.9em;"><strong>${p.l} vs ${p.v}:</strong> [${v}]</li>`;
        });
        document.getElementById('modal-detalle').innerHTML = h+'</ul>';
        document.getElementById('modal-jugada').style.display='block';
    }

    function guardarJugada() {
        const n = document.getElementById('nombreInput').value.trim();
        if(!n || Object.keys(seleccionActual).length < 9) return alert("Completa todos los partidos.");
        const jugada = { nombre: n, votos: seleccionActual, pagado: false, timestamp: firebase.database.ServerValue.TIMESTAMP };
        db.ref('jugadas').push(jugada);
        alert("¡Jugada Guardada! No olvides mandar tu ticket."); location.reload();
    }

    function actualizarLeaderboard() {
        const container = document.getElementById('posiciones-render');
        let t = todasLasJugadas.map(j => {
            let pts = 0; PARTIDOS.forEach(p => { if(j.votos[p.id] === resultadosOficiales[p.id]) pts++; });
            return {n:j.nombre, p:pts};
        }).sort((a,b) => b.p - a.p);
        let h = '<table><tr><th>Pos</th><th>Nombre</th><th>Pts</th></tr>';
        t.forEach((it, i) => { h += `<tr><td>${i+1}</td><td>${it.n}</td><td>${it.p}</td></tr>`; });
        container.innerHTML = h+'</table>';
    }
    function limpiarBaseDatos() { if(confirm("¿BORRAR TODO? Esto no se puede deshacer.")) db.ref().remove(); }
    window.onload = renderPartidos;
</script>
</body>
</html>
