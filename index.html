<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUINIELAS REGIAS - YEMI</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --verde: #006847; --blanco: #ffffff; --rojo: #CE1126; --gris: #f4f4f4; --pago-si: #28a745; --pago-no: #dc3545; --azul: #007bff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gris); margin: 0; padding: 10px; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 600px; margin: auto; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header-main { background: var(--verde); color: white; padding: 20px; text-align: center; border-bottom: 5px solid var(--rojo); }
        .header-main h1 { margin: 0; font-size: 1.5em; text-transform: uppercase; letter-spacing: 1px; }
        .header-main p { margin: 5px 0 0; font-weight: bold; font-size: 0.9em; opacity: 0.9; min-height: 1.2em; }
        .header-title { background: white; padding: 15px; text-align: center; border-bottom: 1px solid #eee; }
        .tabs { display: none; background: #222; }
        .tab-btn { flex: 1; padding: 15px; color: #bbb; border: none; background: none; cursor: pointer; font-weight: bold; }
        .tab-btn.active { color: white; background: var(--verde); border-bottom: 4px solid var(--rojo); }
        .content { padding: 15px; display: none; }
        .content.active { display: block; }
        .partido-card { background: #fff; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 12px; padding: 15px 10px; display: flex; align-items: center; justify-content: space-between; }
        .equipo { font-weight: 700; width: 30%; font-size: 0.8em; text-align: center; line-height: 1.2; }
        .lev-container { display: flex; gap: 8px; justify-content: center; width: 40%; }
        .btn-lev { border: 2px solid #ccc; background: #fdfdfd; padding: 12px 0; border-radius: 8px; font-weight: 900; cursor: pointer; flex: 1; min-width: 44px; color: #666; }
        .btn-lev.selected { background: var(--verde); color: white; border-color: var(--verde); }
        .btn-lev.real { background: var(--rojo); color: white; border-color: var(--rojo); }
        .ticket-box { display: none; background: #ffffff; border: 2px solid var(--verde); padding: 20px; border-radius: 8px; margin-top: 10px; }
        .ticket-text { font-family: 'Courier New', monospace; font-size: 0.9em; color: #333; background: #f4f4f4; padding: 15px; border-radius: 4px; border: 1px solid #ddd; display: block; margin: 15px 0; white-space: pre-wrap; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        th, td { padding: 12px 8px; border-bottom: 1px solid #eee; text-align: left; }
        .ganador-row { font-weight: bold; background: #fff3cd !important; color: #856404 !important; }
        .btn-main { width: 100%; padding: 18px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .toggle-switch { display: flex; align-items: center; justify-content: space-between; background: #f0f0f0; padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #ddd; }
        #modal-jugada { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:1000; overflow-y: auto; }
        .modal-content { background:white; margin:10% auto; padding:20px; width:85%; max-width:400px; border-radius:12px; }
    </style>
</head>
<body>

<div id="modal-jugada"><div class="modal-content"><h3 id="modal-nombre" style="margin:0; color:var(--verde);"></h3><div id="modal-fecha" style="font-size:0.75em; color:#666; margin-bottom:12px; border-bottom:1px dashed #ccc;"></div><div id="modal-detalle"></div><button onclick="document.getElementById('modal-jugada').style.display='none'" class="btn-main" style="background:#333; margin-top:15px;">CERRAR</button></div></div>

<div class="container">
    <div class="header-main"><h1>🇲🇽 QUINIELAS REGIAS 🇲🇽</h1><p id="display-jornada"></p></div>
    <div class="header-title"><h2>Qu<span onclick="activarModoMaestro()" style="cursor:default">i</span>niela Control</h2></div>
    
    <div class="tabs" id="barra-tabs">
        <button class="tab-btn active" onclick="showTab('jugador')">REGISTRAR</button>
        <button class="tab-btn" id="btn-tab-pos" onclick="showTab('posiciones')">TABLA</button>
        <button class="tab-btn" onclick="showTab('admin')">ADMIN</button>
    </div>

    <div id="jugador" class="content active">
        <div id="form-registro">
            <input type="text" id="nombreInput" style="width:100%; padding:15px; box-sizing:border-box; border-radius:8px; border:1px solid #ccc; margin-bottom:10px;" placeholder="Nombre completo">
            <div id="lista-jugador"></div>
            <button class="btn-main" style="background: var(--verde)" onclick="guardarJugada()">✅ GENERAR TICKET</button>
        </div>
        <div id="ticket-final" class="ticket-box">
            <h3 style="margin:0; color: var(--verde); text-align: center;">🎟️ TICKET LISTO</h3>
            <div id="mensaje-texto" class="ticket-text"></div>
            <button onclick="copiarAlPortapapeles()" class="btn-main" style="background: var(--azul)">📋 COPIAR PARA WHATSAPP</button>
            <button onclick="location.reload()" style="width:100%; border:none; background:none; color:gray; margin-top:15px; cursor:pointer;">Registrar otra</button>
        </div>
    </div>

    <div id="posiciones" class="content">
        <div id="mensaje-bloqueo" style="text-align: center; padding: 40px 0;"><p style="font-size: 1.1em; color: #777; font-weight:bold;">🏆 Resultados en proceso...</p></div>
        <div id="tabla-real" style="display:none;"><h3 style="text-align: center; color:var(--verde);">Tabla General 🏆</h3><div id="posiciones-render"></div></div>
    </div>

    <div id="admin" class="content">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px; background:#eee; padding:10px; border-radius:8px;">
            <span>Recaudado: <strong id="fin-si">$0</strong></span>
            <span>Pendiente: <strong id="fin-no">$0</strong></span>
        </div>
        <div class="toggle-switch"><span>MOSTRAR TABLA A USUARIOS:</span><input type="checkbox" id="switch-tabla" onchange="db.ref('config').update({mostrarTabla: this.checked})"></div>
        <div style="background:#f8f9fa; padding:10px; border-radius:10px; border:1px solid #ddd; margin-bottom:15px;">
            <input type="text" id="cfg-jornada" placeholder="Jornada">
            <input type="text" id="cfg-costo" placeholder="Costo $">
            <button onclick="guardarConfigGeneral()" class="btn-main" style="padding:10px; background:#333; height:auto;">💾 GUARDAR CONFIG</button>
        </div>
        <div id="lista-admin"></div>
        <button class="btn-main" style="background: var(--rojo); margin-top:10px;" onclick="guardarResultadosOficiales()">PUBLICAR RESULTADOS</button>
        <hr>
        <h4>Participantes</h4>
        <input type="text" id="buscadorParticipante" style="border: 2px solid var(--azul); padding:10px; width:100%; border-radius:8px; margin-bottom:10px;" placeholder="🔍 Buscar..." oninput="renderAdminParticipantes()">
        <div id="admin-lista-render"></div>
        <button onclick="if(confirm('¿RESET?')) db.ref().remove()" class="btn-main" style="background:black; margin-top:30px;">🚨 RESET TOTAL</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBgmqQLnUIPuaDgXOEvuBAoY_mcd69Qw7E", authDomain: "quinielaligamx-68b52.firebaseapp.com", databaseURL: "https://quinielaligamx-68b52-default-rtdb.firebaseio.com", projectId: "quinielaligamx-68b52", storageBucket: "quinielaligamx-68b52.firebasestorage.app", messagingSenderId: "745257098090", appId: "1:745257098090:web:3c13bf19a1a0c1718ca313" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const J10_BASE = [{id:1,l:"Mazatlán",v:"León"},{id:2,l:"Necaxa",v:"Pumas"},{id:3,l:"Cruz Azul",v:"Atl. San Luis"},{id:4,l:"Querétaro",v:"América"},{id:5,l:"Pachuca",v:"Puebla"},{id:6,l:"Atlas",v:"Chivas"},{id:7,l:"Tigres",v:"Monterrey"},{id:8,l:"Toluca",v:"FC Juárez"},{id:9,l:"Tijuana",v:"Santos"}];
    
    let CONFIG = { costo: "10", jornada: "", mostrarTabla: false }, PARTIDOS = J10_BASE, todasLasJugadas = [], resultadosOficiales = {}, seleccionActual = {};

    // 1. ESCUCHAR CONFIGURACIÓN
    db.ref('config').on('value', s => { 
        if(s.val()){ 
            CONFIG = s.val(); 
            document.getElementById('display-jornada').innerText = CONFIG.jornada;
            document.getElementById('switch-tabla').checked = CONFIG.mostrarTabla;
            document.getElementById('mensaje-bloqueo').style.display = CONFIG.mostrarTabla ? 'none' : 'block';
            document.getElementById('tabla-real').style.display = CONFIG.mostrarTabla ? 'block' : 'none';
            // SI EL ADMIN ACTIVA LA TABLA, TODOS LA VEN
            if(CONFIG.mostrarTabla) {
                document.getElementById('btn-tab-pos').style.display = 'inline-block';
                actualizarLeaderboard();
            }
        } 
    });

    // 2. ESCUCHAR PARTIDOS Y RESULTADOS
    db.ref('partidos').on('value', s => { PARTIDOS = s.val() || J10_BASE; renderPartidos(); });
    db.ref('oficial').on('value', s => { resultadosOficiales = s.val() || {}; actualizarLeaderboard(); renderPartidos(); });

    // 3. ESCUCHAR JUGADAS
    db.ref('jugadas').on('value', s => { 
        todasLasJugadas = []; s.forEach(c => { todasLasJugadas.push({id:c.key, ...c.val()}); }); 
        todasLasJugadas.sort((a,b) => (a.timestamp || 0) - (b.timestamp || 0));
        actualizarLeaderboard();
        renderAdminParticipantes();
        calcularFinanzas();
    });

    function renderPartidos() {
        const listJ = document.getElementById('lista-jugador'), listA = document.getElementById('lista-admin');
        listJ.innerHTML = ''; listA.innerHTML = '';
        PARTIDOS.forEach(p => {
            listJ.innerHTML += `<div class="partido-card"><div class="equipo">${p.l}</div><div class="lev-container"><button class="btn-lev ${seleccionActual[p.id]==='L'?'selected':''}" onclick="setSel(${p.id},'L')">L</button><button class="btn-lev ${seleccionActual[p.id]==='E'?'selected':''}" onclick="setSel(${p.id},'E')">E</button><button class="btn-lev ${seleccionActual[p.id]==='V'?'selected':''}" onclick="setSel(${p.id},'V')">V</button></div><div class="equipo">${p.v}</div></div>`;
            listA.innerHTML += `<div class="partido-card"><div class="equipo">${p.l}</div><div class="lev-container"><button class="btn-lev ${resultadosOficiales[p.id]==='L'?'real':''}" onclick="setOficial(${p.id},'L')">L</button><button class="btn-lev ${resultadosOficiales[p.id]==='E'?'real':''}" onclick="setOficial(${p.id},'E')">E</button><button class="btn-lev ${resultadosOficiales[p.id]==='V'?'real':''}" onclick="setOficial(${p.id},'V')">V</button></div><div class="equipo">${p.v}</div></div>`;
        });
    }

    function actualizarLeaderboard() {
        const render = document.getElementById('posiciones-render');
        if (!todasLasJugadas.length) return;

        let tabla = todasLasJugadas.map(j => {
            let pts = 0;
            PARTIDOS.forEach(p => {
                const miVoto = String(j.votos[p.id]);
                const oficial = String(resultadosOficiales[p.id]);
                if (oficial !== "undefined" && miVoto === oficial) pts++;
            });
            return { nombre: j.nombre, puntos: pts, fecha: j.timestamp || 0 };
        }).sort((a, b) => b.puntos - a.puntos || a.fecha - b.fecha);

        const max = tabla[0].puntos;
        let html = '<table><tr><th>Pos</th><th>Nombre</th><th style="text-align:center;">Pts</th></tr>';
        tabla.forEach((it, i) => {
            const win = (max > 0 && it.puntos === max && i === 0);
            html += `<tr class="${win ? 'ganador-row' : ''}"><td>${i+1}</td><td>${it.nombre}${win?' 🏆 GANADOR':''}</td><td style="text-align:center; font-weight:bold;">${it.puntos}</td></tr>`;
        });
        render.innerHTML = html + '</table>';
    }

    function renderAdminParticipantes() {
        const body = document.getElementById('admin-lista-render'); body.innerHTML = '';
        const filtro = document.getElementById('buscadorParticipante').value.toLowerCase();
        todasLasJugadas.filter(j => j.nombre.toLowerCase().includes(filtro)).forEach(j => {
            body.innerHTML += `<div class="partido-card"><span>${j.nombre}</span><div><button onclick="db.ref('jugadas/${j.id}').update({pagado:${!j.pagado}})">${j.pagado?'$':'X'}</button><button onclick="verDetalle('${j.id}')">👁️</button><button onclick="if(confirm('¿Borrar?')) db.ref('jugadas/${j.id}').remove()">🗑️</button></div></div>`;
        });
    }

    function verDetalle(id) {
        const j = todasLasJugadas.find(x => x.id === id);
        document.getElementById('modal-nombre').innerText = j.nombre;
        let h = '';
        PARTIDOS.forEach(p => { 
            const miV = j.votos[p.id] || '?';
            const acierto = resultadosOficiales[p.id] && miV === resultadosOficiales[p.id];
            h += `<div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #eee; color:${acierto?'green':'black'}"><span>${p.l} vs ${p.v}</span><span>[${miV}]</span></div>`; 
        });
        document.getElementById('modal-detalle').innerHTML = h;
        document.getElementById('modal-jugada').style.display = 'block';
    }

    function guardarJugada() {
        const n = document.getElementById('nombreInput').value.trim();
        if(!n || Object.keys(seleccionActual).length < PARTIDOS.length) return alert("Completa la quiniela.");
        db.ref('jugadas').push({ nombre: n, votos: seleccionActual, pagado: false, timestamp: firebase.database.ServerValue.TIMESTAMP });
        document.getElementById('form-registro').style.display='none'; document.getElementById('ticket-final').style.display='block';
        let t = `👤 ${n.toUpperCase()}\n`; PARTIDOS.forEach(p => { t += `${p.l} vs ${p.v}: [${seleccionActual[p.id]}]\n`; });
        document.getElementById('mensaje-texto').innerText = t;
    }

    function setSel(id, v) { if(seleccionActual[id]===v) delete seleccionActual[id]; else seleccionActual[id]=v; renderPartidos(); }
    function setOficial(id, v) { if(resultadosOficiales[id]===v) delete resultadosOficiales[id]; else resultadosOficiales[id]=v; renderPartidos(); }
    function guardarResultadosOficiales() { db.ref('oficial').set(resultadosOficiales).then(()=>alert("Publicado ✅")); }
    function guardarConfigGeneral() { db.ref('config').update({jornada: document.getElementById('cfg-jornada').value.toUpperCase(), costo: document.getElementById('cfg-costo').value}); alert("OK ✅"); }
    function activarModoMaestro() { if(prompt("PIN:")==="1234") document.getElementById('barra-tabs').style.display='flex'; }
    function showTab(t) { document.querySelectorAll('.content').forEach(c => c.classList.remove('active')); document.getElementById(t).classList.add('active'); document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); event.currentTarget.classList.add('active'); }
    function calcularFinanzas() { let si=0, no=0; todasLasJugadas.forEach(j=>{ if(j.pagado) si+=10; else no+=10; }); document.getElementById('fin-si').innerText=`$${si}`; document.getElementById('fin-no').innerText=`$${no}`; }
    function copiarAlPortapapeles() { navigator.clipboard.writeText(document.getElementById('mensaje-texto').innerText).then(()=>alert("Copiado ✅")); }
    window.onload = renderPartidos;
</script>
</body>
</html>
