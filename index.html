        renderAdminParticipantes();
        calcularLeaderboard();
        actualizarBotonCierreAdminUI();
    }

    function cambiarEtapaVisualUsuario(etapa) {
        ETAPA_SELECCIONADA_USER = etapa;
        SEL_USER = {};
        actualizarUI();
    }

    function cambiarEtapaAdminResultados(etapa) {
        ETAPA_SELECCIONADA_ADMIN_RESULTADOS = etapa;
        renderListaPartidosAdmin();
    }

    let SEL_USER = {};

    function renderListaPartidosUsuario() {
        const div = document.getElementById('lista-jugador');
        div.innerHTML = '';
        const partidos = MUNDIAL_FASES_ESTRUCTURA[ETAPA_SELECCIONADA_USER].partidos;
        const isCerrada = SERVER_DATA.cierres[ETAPA_SELECCIONADA_USER];
        const resOfi = SERVER_DATA.oficial_historial[ETAPA_SELECCIONADA_USER] || {};

        partidos.forEach(p => {
            const marcadorOficial = resOfi[p.id] || "";
            
            let levButtonsHtml = "";
            if (isCerrada) {
                levButtonsHtml = ['L','E','V'].map(v => {
                    const classReal = (marcadorOficial === v) ? 'real' : '';
                    return `<button class="btn-lev ${classReal}" style="cursor:default;" disabled>${v}</button>`;
                }).join('');
            } else {
                levButtonsHtml = ['L','E','V'].map(v => {
                    const classSelected = (SEL_USER[p.id] === v) ? 'selected' : '';
                    return `<button class="btn-lev ${classSelected}" onclick="setVotoUser(${p.id},'${v}')">${v}</button>`;
                }).join('');
            }

            div.innerHTML += `
                <div class="partido-card">
                    <div class="meta-header"><span>${p.grupo}</span> <span>ID: ${p.id}</span></div>
                    <div class="partido-row">
                        <div class="equipo">${p.l}</div>
                        <div class="lev-container">
                            ${levButtonsHtml}
                        </div>
                        <div class="equipo">${p.v}</div>
                    </div>
                    <div class="meta-footer">${p.meta} ${isCerrada && marcadorOficial ? `| ➔ EN VIVO: [${marcadorOficial}]` : ''}</div>
                </div>`;
        });
    }

    function renderListaPartidosAdmin() {
        const div = document.getElementById('lista-admin');
        if(!div) return;
        div.innerHTML = '';
        const partidos = MUNDIAL_FASES_ESTRUCTURA[ETAPA_SELECCIONADA_ADMIN_RESULTADOS].partidos;
        const resOfi = SERVER_DATA.oficial_historial[ETAPA_SELECCIONADA_ADMIN_RESULTADOS] || {};

        partidos.forEach(p => {
            div.innerHTML += `
                <div class="partido-card">
                    <div class="meta-header"><span>${p.grupo}</span> <span>ID: ${p.id}</span></div>
                    <div class="partido-row">
                        <div class="equipo">${p.l}</div>
                        <div class="lev-container">
                            ${['L','E','V'].map(v => `<button class="btn-lev ${resOfi[p.id]===v ? 'real':''}" onclick="setVotoAdmin(${p.id},'${v}')">${v}</button>`).join('')}
                        </div>
                        <div class="equipo">${p.v}</div>
                    </div>
                </div>`;
        });
    }

    function setVotoUser(id, valor) { SEL_USER[id] = valor; renderListaPartidosUsuario(); }
    function setVotoAdmin(id, valor) { 
        if(!SERVER_DATA.oficial_historial[ETAPA_SELECCIONADA_ADMIN_RESULTADOS]) SERVER_DATA.oficial_historial[ETAPA_SELECCIONADA_ADMIN_RESULTADOS] = {};
        SERVER_DATA.oficial_historial[ETAPA_SELECCIONADA_ADMIN_RESULTADOS][id] = valor;
        renderListaPartidosAdmin(); 
    }

    function guardajugada() {
        const nombre = document.getElementById('nombreInput').value.trim();
        if(!nombre) return alert("Por favor escribe tu nombre completo");

        const partidos = MUNDIAL_FASES_ESTRUCTURA[ETAPA_SELECCIONADA_USER].partidos;
        let respondidos = 0;
        partidos.forEach(p => { if(SEL_USER[p.id]) respondidos++; });

        if(respondidos < partidos.length) {
            return alert("Faltan partidos por pronosticar in esta etapa.");
        }

        db.ref('jugadas').push({
            nombre: nombre,
            votos: SEL_USER,
            pagado: false,
            jornada: ETAPA_SELECCIONADA_USER,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        });

        document.getElementById('registro-area').style.display = 'none';
        document.getElementById('ticket-final').style.display = 'block';

        let t = `👤 COLLAB: ${nombre.toUpperCase()}\n🏆 QUINIELA MUNDIALISTA AE\n📅 ETAPA: ${ETAPA_SELECCIONADA_USER}\n--------------------\n`;
        partidos.forEach(p => { t += `${p.l} vs ${p.v} [${SEL_USER[p.id]}]\n`; });
        document.getElementById('mensaje-texto').innerText = t;
    }

    function calcularLeaderboard() {
        const etapaFiltro = document.getElementById('filtro-tabla').value;
        if(!etapaFiltro) return;
        const resOfi = SERVER_DATA.oficial_historial[etapaFiltro] || {};
        const jugadas = Object.values(SERVER_DATA.jugadas).filter(j => j.jornada === etapaFiltro && j.pagado);
        const partidos = MUNDIAL_FASES_ESTRUCTURA[etapaFiltro].partidos;

        let tabla = jugadas.map(j => {
            let pts = 0;
            partidos.forEach(p => {
                if(resOfi[p.id] && String(j.votos[p.id]) === String(resOfi[p.id])) pts++;
            });
            return { n: j.nombre, p: pts, t: j.timestamp };
        }).sort((a,b) => b.p - a.p || a.t - b.t);

        let h = '<table><tr><th>Pos</th><th>Colaborador</th><th>Pts</th></tr>';
        if(tabla.length === 0) {
            h += `<tr><td colspan="3" style="text-align:center; color:gray;">Sin quinielas validadas (pagadas) para esta etapa.</td></tr>`;
        } else {
            tabla.forEach((it, i) => { h += `<tr class="${i===0 && it.p>0?'ganador-row':''}"><td>${i+1}</td><td>${it.n} ${i===0 && it.p>0?'🏆':''}</td><td><strong>${it.p}</strong></td></tr>`; });
        }
        const containerPuntos = document.getElementById('render-puntos');
        if(containerPuntos) containerPuntos.innerHTML = h + '</table>';
    }

    function toggleCierreAdmin() {
        const e = document.getElementById('selector-etapa-cierre').value;
        const estadoActual = SERVER_DATA.cierres[e] || false;
        db.ref('cierres/' + e).set(!estadoActual);
    }

    function actualizarBotonCierreAdminUI() {
        const selector = document.getElementById('selector-etapa-cierre');
        if(!selector || !selector.value) return; // Blindaje si no se ha cargado en el DOM
        
        const e = selector.value;
        const status = SERVER_DATA.cierres[e] || false;
        const btn = document.getElementById('btn-toggle-cierre');
        if(btn) {
            btn.innerText = status ? `🔓 ABRIR REGISTROS DE LA ${e}` : `🔒 CERRAR REGISTROS DE LA ${e}`;
            btn.style.background = status ? "#28a745" : "var(--mex-rojo)";
        }
    }

    function publicarResultados() {
        const res = SERVER_DATA.oficial_historial[ETAPA_SELECCIONADA_ADMIN_RESULTADOS] || {};
        db.ref('oficial_historial/' + ETAPA_SELECCIONADA_ADMIN_RESULTADOS).set(res).then(() => {
            alert(`Marcadores de la ${ETAPA_SELECCIONADA_ADMIN_RESULTADOS} publicados oficialmente.`);
        });
    }

    function renderAdminParticipantes() {
        const div = document.getElementById('admin-participantes');
        if(!div) return;
        div.innerHTML = '';
        const e = document.getElementById('selector-etapa-pagos').value;
        if(!e) return;
        
        const llaves = Object.keys(SERVER_DATA.jugadas);
        let contador = 0;

        llaves.forEach(id => {
            const j = SERVER_DATA.jugadas[id];
            if(j.jornada === e) {
                contador++;
                div.innerHTML += `
                    <div class="partido-card" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; padding:10px;">
                        <span style="font-size:0.85em; font-weight:bold; color:var(--mex-verde);">${j.nombre}</span>
                        <div style="display:flex; gap:5px;">
                            <button style="background:${j.pagado?'var(--mex-verde)':'#ccc'}; color:white; border:none; padding:6px 12px; border-radius:6px; font-weight:bold; cursor:pointer;" onclick="db.ref('jugadas/${id}').update({pagado:${!j.pagado}})">${j.pagado?'PAGADO $':'VALIDAR X'}</button>
                            <button style="background:#333; color:white; border:none; padding:6px 12px; border-radius:6px; cursor:pointer;" onclick="verDetalle('${id}')">👁️</button>
                        </div>
                    </div>`;
            }
        });
        if(contador === 0) div.innerHTML = "<p style='font-size:0.85em; color:gray; text-align:center;'>Nadie registrado en esta etapa todavía.</p>";
    }

    function verDetalle(id) {
        const j = SERVER_DATA.jugadas[id];
        document.getElementById('modal-nombre').innerText = j.nombre;
        let h = '<table style="width:100%">';
        const partidos = MUNDIAL_FASES_ESTRUCTURA[j.jornada].partidos;
        partidos.forEach(p => { h += `<tr><td>${p.l} vs ${p.v}</td><td style="text-align:right; font-weight:bold; color:var(--mex-verde);">[${j.votos[p.id] || '-'}]</td></tr>`; });
        document.getElementById('modal-detalle').innerHTML = h + '</table>';
        document.getElementById('modal-ver').style.display = 'block';
    }

    function showTab(t) { document.querySelectorAll('.content').forEach(c=>c.classList.remove('active')); document.getElementById(t).classList.add('active'); document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); event.currentTarget.classList.add('active'); }
    function copiarAlPortapapeles() { navigator.clipboard.writeText(document.getElementById('mensaje-texto').innerText).then(()=>alert("Ticket copiado ✅")); }
    
    function entrarAdminSecret() {
        const pass = prompt("Clave de Seguridad:");
        if(btoa(pass) === "RmlicmEyMDI1LjA=") { 
            document.getElementById('btn-admin').style.display='block'; 
            alert("Acceso Concedido."); 
            showTab('admin');
        } else {
            alert("Clave incorrecta.");
        }
    }
</script>
</body>
</html>
